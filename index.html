<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMD Spark | Official App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: #030407;
            background: radial-gradient(circle at 30% 30%, #2a1a0f, #030407 70%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .animated-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }
        
        .moving-orange {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 30% 50%, rgba(255,102,0,0.4) 0%, transparent 30%);
            animation: moveOrange 20s infinite alternate;
            filter: blur(40px);
        }
        
        @keyframes moveOrange {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(5deg) scale(1.2); }
        }

        .premium-card {
            width: 100%;
            max-width: 380px;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 3px;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,102,0,0.3);
        }

        .premium-card::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            background: linear-gradient(45deg, #FF6600, #ffaa00, #FF4400);
            border-radius: 44px;
            z-index: -1;
            animation: borderMove 4s linear infinite;
            opacity: 0.7;
        }
        
        @keyframes borderMove {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .inner {
            background: rgba(10, 10, 10, 0.95);
            border-radius: 37px;
            padding: 24px 14px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .company-name {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #fff, #FF6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,102,0,0.7);
            animation: companyGlow 3s infinite;
        }
        
        @keyframes companyGlow {
            0%, 100% { text-shadow: 0 0 15px rgba(255,102,0,0.6); }
            50% { text-shadow: 0 0 35px rgba(255,102,0,0.9); }
        }

        .logo-glow {
            width: 100px;
            height: 100px;
            margin: 10px auto;
            border-radius: 28px;
            padding: 4px;
            background: linear-gradient(45deg, #FF6600, #fff);
            box-shadow: 0 0 40px rgba(255,102,0,0.8);
            animation: logoPulse 2.5s infinite;
        }
        
        @keyframes logoPulse {
            0% { transform: scale(1); box-shadow: 0 0 25px #FF6600; }
            50% { transform: scale(1.08); box-shadow: 0 0 60px #FF6600; }
        }

        .logo { 
            width: 100%; 
            height: 100%; 
            border-radius: 24px; 
            object-fit: cover;
        }

        .brand { 
            font-size: 28px; 
            font-weight: 900; 
            background: linear-gradient(45deg, #fff, #FF6600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ===== ROWS ===== */
        .row {
            background: linear-gradient(135deg, rgba(255,102,0,0.1), rgba(0,0,0,0.8));
            border: 1px solid rgba(255,102,0,0.3);
            border-radius: 50px;
            padding: 12px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }
        
        .row:hover {
            transform: translateX(5px);
            border-color: #FF6600;
        }
        
        /* ===== LINKS - بالکل الگ الگ ===== */
        .icon-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.3s;
            flex-shrink: 0;
        }
        
        .icon-link:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px currentColor;
        }
        
        .text-link {
            flex: 1;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            padding: 8px;
            border-radius: 30px;
            transition: all 0.3s;
        }
        
        .text-link:hover {
            background: rgba(255,102,0,0.2);
            color: #FFAA00;
        }
        
        .check-link, .badge-link, .folder-link {
            color: white;
            text-decoration: none;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        
        .check-link {
            color: #00ff00;
            font-size: 20px;
        }
        
        .check-link:hover {
            transform: scale(1.2);
            text-shadow: 0 0 15px #00ff00;
        }
        
        .badge-link {
            background: linear-gradient(135deg, #FF6600, #FF4400);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 900;
        }
        
        .badge-link:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #FF6600;
        }
        
        .folder-link {
            color: #FF6600;
            font-size: 18px;
        }
        
        .folder-link:hover {
            transform: scale(1.2);
            text-shadow: 0 0 15px #FF6600;
        }
        
        /* Icon Colors */
        .fb { background: #1877f2; animation: heartbeat 2.5s infinite; }
        .insta { background: linear-gradient(45deg, #f09433, #d62976); animation: spin 4s infinite; }
        .pinterest { background: #e60023; animation: bounce 2s infinite; }
        .tiktok { background: black; color: #25f4ee; animation: glitch 3s infinite; }
        .google { background: #4285F4; animation: float 4s infinite; }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.15); }
            35% { transform: scale(1); }
            45% { transform: scale(1.1); }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        @keyframes glitch {
            0%, 100% { transform: skew(0deg); }
            20% { transform: skew(5deg); }
            40% { transform: skew(-5deg); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Buttons */
        .button-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .btn-main, .btn-wa {
            padding: 16px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 900;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: all 0.3s;
        }

        .btn-main {
            background: linear-gradient(45deg, #fff, #f0f0f0);
            color: #000;
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
        }
        
        .btn-main:hover {
            box-shadow: 0 0 45px #FF6600;
        }

        .btn-wa {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            animation: waGlow 2.5s infinite;
        }
        
        @keyframes waGlow {
            0%, 100% { box-shadow: 0 0 15px #25D366; }
            50% { box-shadow: 0 0 35px #25D366; }
        }

        .footer {
            margin-top: 15px;
            font-size: 8px;
            opacity: 0.6;
        }
    </style>
</head>
